name: 🎮 Generate Pac-Man Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write   # 👈 THIS FIXES YOUR ERROR

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Pac-Man SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/pacman.svg?color_snake=yellow&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b86e8,#3671c6
            dist/pacman-dark.svg?color_snake=yellow&color_dots=#0d1117,#0e4429,#006d32,#26a641,#39d353&color_bg=#0d1117
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
